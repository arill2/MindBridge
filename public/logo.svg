<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Bridge arch -->
  <path d="M20 45 Q60 10 100 45 Q140 10 180 45" stroke="#FF6B2C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Bridge towers -->
  <line x1="60" y1="10" x2="60" y2="50" stroke="#FF6B2C" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="10" x2="140" y2="50" stroke="#FF6B2C" stroke-width="3" stroke-linecap="round"/>
  <!-- Bridge road -->
  <line x1="15" y1="50" x2="185" y2="50" stroke="#FFD23F" stroke-width="3" stroke-linecap="round"/>
  <!-- Vertical cables -->
  <line x1="80" y1="24" x2="80" y2="50" stroke="#FF6B2C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="100" y1="18" x2="100" y2="50" stroke="#FF6B2C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="24" x2="120" y2="50" stroke="#FF6B2C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Sun / heart above bridge -->
  <circle cx="100" cy="6" r="5" fill="#FFD23F"/>
</svg>
